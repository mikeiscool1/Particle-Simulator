<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Particle Simulator</title>
    <style>
        html, body {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" tabindex="1"></canvas>

    <script>
        load("../target/wasm32-unknown-unknown/release/particle_sim.wasm");
        canvas.addEventListener("contextmenu", e => e.preventDefault())
    </script>
</body>
</html>
